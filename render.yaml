services:
  - type: web
    name: prismai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # You will set this manually in the Render dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel URL after deploying frontend
      - key: PYTHON_VERSION
        value: 3.11.0
